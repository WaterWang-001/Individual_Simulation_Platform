<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- shirt -->
  <ellipse cx="32" cy="60" rx="14" ry="8" fill="#FF7070"/>
  <!-- bob hair: wide D-shape covering sides and top, ends at chin level -->
  <path d="M13 28 Q13 15 32 15 Q51 15 51 28 L51 46 Q44 53 32 53 Q20 53 13 46 Z" fill="#8B4513"/>
  <!-- face -->
  <circle cx="32" cy="36" r="14" fill="#FFCC99"/>
  <!-- eyebrows (arched) -->
  <path d="M24 29 Q27 27.5 30 28.5" stroke="#555" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M34 28.5 Q37 27.5 40 29" stroke="#555" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="27" cy="33" r="2.2" fill="#333"/>
  <circle cx="37" cy="33" r="2.2" fill="#333"/>
  <circle cx="27.9" cy="32.2" r="0.9" fill="white"/>
  <circle cx="37.9" cy="32.2" r="0.9" fill="white"/>
  <!-- nose -->
  <ellipse cx="32" cy="37.5" rx="1.4" ry="0.9" fill="#EEB07A" opacity="0.6"/>
  <!-- mouth -->
  <path d="M28 41 Q32 44.5 36 41" stroke="#CC4444" stroke-width="1.3" fill="none" stroke-linecap="round"/>
</svg>
