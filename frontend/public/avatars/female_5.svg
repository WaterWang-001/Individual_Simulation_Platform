<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- shirt -->
  <ellipse cx="32" cy="60" rx="14" ry="8" fill="#CE93D8"/>
  <!-- side hair (left, going down) -->
  <rect x="15" y="25" width="6" height="26" rx="3" fill="#7B3F00"/>
  <!-- side hair (right, going down) -->
  <rect x="43" y="25" width="6" height="26" rx="3" fill="#7B3F00"/>
  <!-- top hair -->
  <ellipse cx="32" cy="23" rx="17" ry="12" fill="#7B3F00"/>
  <!-- face -->
  <circle cx="32" cy="36" r="14" fill="#FFCC99"/>
  <!-- bangs overlay (covers forehead, drawn over face) -->
  <path d="M18 30 Q19 21 32 21 Q45 21 46 30 Q40 35 32 34 Q24 35 18 30 Z" fill="#7B3F00"/>
  <!-- eyebrows (visible just below bangs) -->
  <path d="M24 31.5 Q27 30 30 31.5" stroke="#5A2D00" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M34 31.5 Q37 30 40 31.5" stroke="#5A2D00" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- eyes (below bangs) -->
  <circle cx="27" cy="35" r="2.2" fill="#333"/>
  <circle cx="37" cy="35" r="2.2" fill="#333"/>
  <circle cx="27.9" cy="34.2" r="0.9" fill="white"/>
  <circle cx="37.9" cy="34.2" r="0.9" fill="white"/>
  <!-- nose -->
  <ellipse cx="32" cy="39" rx="1.4" ry="0.9" fill="#EEB07A" opacity="0.6"/>
  <!-- mouth -->
  <path d="M28 43 Q32 46.5 36 43" stroke="#CC4444" stroke-width="1.3" fill="none" stroke-linecap="round"/>
</svg>
