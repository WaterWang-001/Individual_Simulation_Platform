<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- shirt -->
  <ellipse cx="32" cy="60" rx="14" ry="8" fill="#48A999"/>
  <!-- light brown hair -->
  <ellipse cx="32" cy="27" rx="16" ry="13" fill="#8B6914"/>
  <!-- face -->
  <circle cx="32" cy="36" r="14" fill="#FFCC99"/>
  <!-- eyebrows -->
  <path d="M24 29 L30 28" stroke="#6B5010" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M34 28 L40 29" stroke="#6B5010" stroke-width="1.6" stroke-linecap="round"/>
  <!-- eyes (behind glasses) -->
  <circle cx="27" cy="33" r="2" fill="#444"/>
  <circle cx="37" cy="33" r="2" fill="#444"/>
  <circle cx="27.8" cy="32.2" r="0.8" fill="white"/>
  <circle cx="37.8" cy="32.2" r="0.8" fill="white"/>
  <!-- glasses frames -->
  <rect x="21" y="30" width="10" height="7" rx="2.5" fill="none" stroke="#555" stroke-width="1.4"/>
  <rect x="33" y="30" width="10" height="7" rx="2.5" fill="none" stroke="#555" stroke-width="1.4"/>
  <line x1="31" y1="33.5" x2="33" y2="33.5" stroke="#555" stroke-width="1.4"/>
  <!-- nose -->
  <ellipse cx="32" cy="37.5" rx="1.5" ry="1" fill="#EEB07A" opacity="0.7"/>
  <!-- mouth -->
  <path d="M28 41 Q32 45 36 41" stroke="#CC4444" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
